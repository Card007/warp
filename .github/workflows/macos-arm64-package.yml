name: Package macOS arm64

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  package-macos-arm64:
    name: Build macOS arm64 app
    runs-on: macos-14

    env:
      MACOSX_DEPLOYMENT_TARGET: "10.14"
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Rust toolchain
        run: rustup toolchain install 1.92.0 --profile minimal --component rustfmt,clippy

      - name: Use Rust toolchain
        run: rustup default 1.92.0

      - name: Install cargo-bundle
        run: cargo install cargo-bundle --locked

      - name: Add macOS arm64 target
        run: rustup target add aarch64-apple-darwin

      - name: Bundle WarpOss for MacBook M1
        run: ./script/bundle --channel oss --arch aarch64 --nosign

      - name: Inspect app binary
        run: |
          file target/aarch64-apple-darwin/release-lto/bundle/osx/WarpOss.app/Contents/MacOS/warp-oss
          lipo -archs target/aarch64-apple-darwin/release-lto/bundle/osx/WarpOss.app/Contents/MacOS/warp-oss

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: WarpOss-macos-arm64-app
          path: target/aarch64-apple-darwin/release-lto/bundle/osx/WarpOss.app

      - name: Upload dmg artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: WarpOss-macos-arm64-dmg
          path: target/aarch64-apple-darwin/release-lto/bundle/osx/**/*.dmg
