name: Package macOS arm64

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional existing GitHub Release tag to publish assets under."
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package-macos-arm64:
    name: Build macOS arm64 app
    runs-on: macos-14

    env:
      MACOSX_DEPLOYMENT_TARGET: "10.14"
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Install Rust toolchain
        run: rustup toolchain install 1.92.0 --profile minimal --component rustfmt,clippy

      - name: Use Rust toolchain
        run: rustup default 1.92.0

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: macos-arm64-package
          cache-on-failure: true

      - name: Install macOS package dependencies
        run: brew install protobuf create-dmg

      - name: Install cargo-bundle
        run: script/install_cargo_bundle

      - name: Install cargo release dependencies
        run: script/install_cargo_release_deps --no-build-deps

      - name: Add macOS arm64 target
        run: rustup target add aarch64-apple-darwin

      - name: Bundle WarpOss for MacBook M1
        run: ./script/bundle --channel oss --arch aarch64 --nosign

      - name: Inspect app binary
        run: |
          file target/release-lto/bundle/osx/WarpOss.app/Contents/MacOS/warp-oss
          lipo -archs target/release-lto/bundle/osx/WarpOss.app/Contents/MacOS/warp-oss
          ls -lh target/release-lto/bundle/osx

      - name: Archive app bundle
        run: ditto -c -k --sequesterRsrc --keepParent target/release-lto/bundle/osx/WarpOss.app target/release-lto/bundle/osx/WarpOss-macos-arm64.app.zip

      - name: Upload app zip artifact
        uses: actions/upload-artifact@v7
        with:
          name: WarpOss-macos-arm64-app-zip
          path: target/release-lto/bundle/osx/WarpOss-macos-arm64.app.zip
          if-no-files-found: error

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v7
        with:
          name: WarpOss-macos-arm64-dmg
          path: target/release-lto/bundle/osx/WarpOss.dmg
          if-no-files-found: error

      - name: Publish GitHub Release assets
        if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '') }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          if ! git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "::error::Release tag '$RELEASE_TAG' does not exist. Push the tag first or use a tag-triggered run."
            exit 1
          fi

          cp target/release-lto/bundle/osx/WarpOss.dmg target/release-lto/bundle/osx/WarpOss-macos-arm64.dmg

          assets=(
            target/release-lto/bundle/osx/WarpOss-macos-arm64.dmg
            target/release-lto/bundle/osx/WarpOss-macos-arm64.app.zip
          )

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "$RELEASE_TAG" \
              --notes "Unsigned macOS arm64 build from $GITHUB_SHA." \
              --prerelease
          fi
